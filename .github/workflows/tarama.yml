name: TS EDGE Tarama

on:
  schedule:
    - cron: "*/30 6-18 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tarama:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Taramayi calistir
        run: node tarama.js

      - name: Sonucu kaydet
        run: |
          git config user.name "ts-edge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "Tarama guncellendi"
          git push
